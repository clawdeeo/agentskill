name: Deploy

on:
  workflow_call:
    secrets:
      PYPI_API_TOKEN:
        required: true

jobs:
  pypi:
    name: PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v6
        name: Download Distribution

        with:
          name: dist
          path: dist

      - name: Deploy
        uses: pypa/gh-action-pypi-publish@release/v1

        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
