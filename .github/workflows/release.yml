name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: pypi
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - uses: actions/setup-python@v6
        name: Setup Python

        with:
          python-version: "3.10"

      - name: Validate Tag

        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          pyproject = Path("pyproject.toml").read_text()
          match = re.search(
              r'(?ms)^\[project\]\s+.*?^version = "([^"]+)"',
              pyproject,
          )

          if match is None:
              raise SystemExit("could not read project.version from pyproject.toml")

          version = match.group(1)
          expected = f"refs/tags/{version}"
          actual = "${{ github.ref }}"

          if actual != expected:
              raise SystemExit(
                  f"tag/version mismatch: expected {expected}, got {actual}"
              )
          PY

      - uses: actions/download-artifact@v4
        name: Download Distribution

        with:
          name: dist
          path: dist

      - name: Deploy
        uses: pypa/gh-action-pypi-publish@release/v1
